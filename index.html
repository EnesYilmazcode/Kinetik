<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetik</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="topbar">
        <h1 id="logo-btn" style="cursor:pointer" title="Return to home">KINETIK</h1>
        <span style="flex:1"></span>
        <button id="path-toggle" style="padding:5px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;font-weight:500;display:none">Show Path</button>
        <div style="width:1px;height:20px;background:var(--border)"></div>
        <button class="topbar-btn" id="render-btn" title="Render orbit video"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4"/><circle cx="6" cy="6" r="1.5" fill="currentColor" stroke="none"/></svg> Render</button>
        <input type="file" id="import-file" accept=".kinetik" style="display:none">
    </div>

    <div id="main">
        <div id="viewport">
            <div id="gen-info" style="display:none"></div>
            <button id="panel-reopen" title="Show activity">&#9776;</button>
            <div class="recording-badge" id="rec-badge">&#9679; REC</div>
            <button id="reset-view">Reset View</button>
            <div id="editor-toolbar">
                <button class="ed-btn ed-build-only" id="ed-move" title="Move mode (M)" style="display:none"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 2v10M2 7h10M7 2l-2 2M7 2l2 2M7 12l-2-2M7 12l2-2M2 7l2-2M2 7l2 2M12 7l-2-2M12 7l-2 2"/></svg> Move</button>
                <button class="ed-btn ed-build-only" id="ed-rotate" title="Rotate (R)" style="display:none"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7a5 5 0 0 1 10 0"/><path d="M9 4l3 3-3 3"/></svg> Rotate</button>
                <button class="ed-btn ed-build-only" id="ed-scale" title="Scale (S)" style="display:none"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="4" height="4" rx="1"/><rect x="6" y="6" width="6" height="6" rx="1"/></svg> Scale</button>
            </div>
            <div id="model-picker" style="display:none">
                <div id="mp-header">Models <button id="mp-close">&times;</button></div>
                <div id="mp-grid"></div>
            </div>
            <div id="editor-info"></div>
            <div id="render-overlay">
                <div id="render-dot"></div>
                <div id="render-hint">Click a point to orbit around</div>
                <div id="render-progress">
                    <div>Recording...</div>
                    <div class="render-bar"><div class="render-fill" id="render-fill"></div></div>
                </div>
            </div>
            <div id="welcome">
              <div class="w-left">
                <div class="w-brand">kinetik</div>
                <div class="w-tagline">Describe a scene.<br><span>Watch it come alive.</span></div>
                <div class="w-input-wrap">
                  <input type="text" id="welcome-input" placeholder="A person sneaks through a forest..." autofocus>
                </div>


                <div class="w-examples">
                    <div class="w-ex" data-prompt="A person walks through a busy city street">
                        <span class="w-ex-label">City</span>
                    </div>
<div class="w-ex" data-prompt="A person jogs through a park at sunrise">
                        <span class="w-ex-label">Park</span>
                    </div>
                    <div class="w-ex" data-prompt="A person explores a spooky graveyard at night">
                        <span class="w-ex-label">Spooky</span>
                    </div>
                    <div class="w-ex" data-prompt="A person celebrates winning on a sports field">
                        <span class="w-ex-label">Victory</span>
                    </div>
                </div>
              </div>
              <div class="w-right">
                <div id="w-preview"></div>
                <div class="w-motion-label" id="w-motion-label">backflip</div>
              </div>
            </div>
            <div id="timeline-bar">
                <div id="timeline-playhead"></div>
                <div id="timeline-controls">
                    <button class="tl-btn" id="tl-playpause" title="Play/Pause (Space)"><svg width="10" height="12" viewBox="0 0 10 12"><path d="M1 0.5v11l8.5-5.5z" fill="currentColor"/></svg></button>
                    <span class="tl-time" id="tl-time">0.0s</span>
                </div>
                <div id="timeline-clips"></div>


            </div>
        </div>

        <div id="panel" class="collapsed">
            <div id="panel-header">
                <button class="panel-tab active" id="tab-activity">Activity</button>
                <button class="panel-tab" id="tab-add">Add</button>
                <div id="panel-collapse-wrap">
                    <button id="panel-collapse" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px" title="Collapse">&times;</button>
                </div>
            </div>
            <div id="console"></div>
            <div id="chat-input-bar">
                <input type="text" id="chat-input" placeholder="Add motion, object, or action..." autocomplete="off">
            </div>
            <div id="add-tab-content">
                <div id="add-create-wrap">
                    <input type="text" id="add-create-input" placeholder="Create custom model...">
                    <div id="add-create-status"></div>
                </div>
                <div id="add-tab-grid"></div>
            </div>
        </div>
        <!-- Hidden elements for JS references -->
        <textarea id="prompt-input" style="display:none"></textarea>
        <input id="duration-input" type="hidden" value="5">
        <button id="generate-btn" style="display:none">Generate</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
